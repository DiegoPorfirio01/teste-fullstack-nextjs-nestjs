# Prometheus configuration - teste-api
# Scrape metrics from NestJS /metrics endpoint

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          env: observability

  # NestJS API - endpoint /v1/metrics
  - job_name: teste-api
    metrics_path: /v1/metrics
    scrape_interval: 10s
    scrape_timeout: 5s
    static_configs:
      - targets: ["api:3001"]
        labels:
          app: teste-api
          env: production
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "teste-api"
